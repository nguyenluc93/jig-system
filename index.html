<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>JIG管理システム</title>

<style>
body{margin:0;font-family:Arial;display:flex;background:#f5f7fb}
.sidebar{width:240px;background:#0f172a;color:white;height:100vh;padding:15px}
.menu button{width:100%;padding:10px;margin:5px 0;background:#1e293b;color:white;border:0;border-radius:8px;cursor:pointer}
.menu button:hover{background:#38bdf8}
.main{flex:1;padding:20px}
.card{background:white;padding:12px;margin:8px;border-radius:10px;display:inline-block;min-width:160px}
input,select{padding:8px;margin:5px;width:220px}
.btn{padding:8px 12px;background:#38bdf8;border:0;color:white;border-radius:6px;cursor:pointer}
</style>
</head>

<body>

<div class="sidebar">
<h2>🔧 JIGシステム</h2>
<div class="menu">
<button onclick="home()">ダッシュボード</button>
<button onclick="borrow()">借りる</button>
<button onclick="jigs()">JIG一覧</button>
<button onclick="comment()">コメント</button>
<button onclick="admin()">管理</button>
</div>
</div>

<div class="main" id="main"></div>

<script>
const API="https://jig-system.onrender.com";

/* DASHBOARD */
async function home(){
let j=await (await fetch(API+"/jigs")).json();
let t=j.length,b=j.filter(x=>x.status=="BORROWED").length;

main.innerHTML=`
<h2>📊 ダッシュボード</h2>
<div class="card">総数<br>${t}</div>
<div class="card">使用中<br>${b}</div>
<div class="card">空き<br>${t-b}</div>`;
}

/* JIG */
async function jigs(){
let d=await (await fetch(API+"/jigs")).json();
main.innerHTML="<h2>JIG一覧</h2>"+d.map(x=>`
<div class="card">
<b>${x.jig_code}</b><br>${x.name}<br>${x.status}
</div>`).join("");
}

/* BORROW */
async function borrow(){
let d=await (await fetch(API+"/jigs")).json();
main.innerHTML="<h2>借りる</h2>"+d.map(x=>`
<div class="card">
<input type="checkbox" value="${x.id}">${x.jig_code}
</div>`).join("")+
`<br><button class="btn" onclick="doBorrow()">確定</button>`;
}

async function doBorrow(){
let ids=[...document.querySelectorAll("input:checked")].map(x=>+x.value);
let r=await fetch(API+"/borrow",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user:"admin",jig_ids:ids})});
alert("session:"+ (await r.json()).session_id);
home();
}

/* COMMENT */
function comment(){
main.innerHTML=`
<h2>コメント</h2>
<input id="c"><button class="btn" onclick="sendC()">送信</button>`;
}

async function sendC(){
await fetch(API+"/comment",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text:c.value})});
home();
}

/* ADMIN */
function admin(){
main.innerHTML=`
<h2>管理</h2>

<h3>ユーザー作成</h3>
<input id="u"><input id="p">
<select id="r"><option>user</option><option>admin</option></select>
<button class="btn" onclick="cu()">作成</button>

<h3>JIG追加</h3>
<input id="jc"><input id="jn">
<button class="btn" onclick="cj()">追加</button>

<h3>コメント削除 (ID)</h3>
<input id="cid">
<button class="btn" onclick="dc()">削除</button>
`;
}

async function cu(){
await fetch(API+"/create_user",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:u.value,password:p.value,role:r.value})});
alert("ok");
}

async function cj(){
await fetch(API+"/add_jig",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({jig_code:jc.value,name:jn.value,status:"AVAILABLE"})});
alert("ok");
}

async function dc(){
await fetch(API+"/comment/"+cid.value,{method:"DELETE"});
alert("deleted");
}

home();
</script>

</body>
</html>

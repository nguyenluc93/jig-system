<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>JIG SYSTEM</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    display: flex;
}

.sidebar {
    width: 220px;
    background: #1e293b;
    color: white;
    height: 100vh;
    padding: 10px;
}

.sidebar h2 {
    text-align: center;
}

.menu button {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    background: #334155;
    color: white;
    border: none;
    cursor: pointer;
}

.menu button:hover {
    background: #475569;
}

.main {
    flex: 1;
    padding: 20px;
    background: #f1f5f9;
}

.card {
    display: inline-block;
    background: white;
    padding: 15px;
    margin: 10px;
    border-radius: 10px;
    width: 150px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>JIG</h2>

    <div class="menu">
        <button onclick="home()">Home</button>
        <button onclick="borrow()">Borrow</button>
        <button onclick="jigList()">JIG List</button>
        <button onclick="comment()">Comment</button>
        <button onclick="admin()">Admin</button>
    </div>
</div>

<div class="main" id="main">
    Loading...
</div>

<script>
const API = "https://jig-system.onrender.com";

/* ================= HOME ================= */
async function home(){
    let res = await fetch(API + "/jigs");
    let jigs = await res.json();

    let total = jigs.length;
    let borrowed = jigs.filter(j => j.status === "BORROWED").length;
    let available = total - borrowed;

    document.getElementById("main").innerHTML = `
        <h1>Dashboard</h1>

        <div class="card">Total: ${total}</div>
        <div class="card">Borrowed: ${borrowed}</div>
        <div class="card">Available: ${available}</div>
    `;
}

/* ================= JIG LIST ================= */
async function jigList(){
    let res = await fetch(API + "/jigs");
    let data = await res.json();

    let html = "<h2>JIG LIST</h2>";

    data.forEach(j => {
        html += `
        <div class="card">
            <b>${j.jig_code}</b><br>
            ${j.name}<br>
            ${j.status}
        </div>`;
    });

    document.getElementById("main").innerHTML = html;
}

/* ================= BORROW (simple version) ================= */
async function borrow(){
    let res = await fetch(API + "/jigs");
    let data = await res.json();

    let html = "<h2>Borrow JIG</h2>";

    data.forEach(j => {
        html += `
        <div class="card">
            <input type="checkbox" value="${j.id}">
            ${j.jig_code} - ${j.name}
        </div>`;
    });

    html += `<br><button onclick="confirmBorrow()">CONFIRM</button>`;

    document.getElementById("main").innerHTML = html;
}

async function confirmBorrow(){
    let checked = [...document.querySelectorAll("input[type=checkbox]:checked")]
        .map(e => parseInt(e.value));

    let res = await fetch(API + "/borrow", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            user: "admin",
            jig_ids: checked
        })
    });

    let data = await res.json();
    alert("SESSION ID: " + data.session_id);
    home();
}

/* ================= COMMENT ================= */
async function comment(){
    document.getElementById("main").innerHTML = `
        <h2>Comment</h2>
        <input id="cmt" placeholder="write comment">
        <button onclick="sendComment()">Send</button>
    `;
}

async function sendComment(){
    let text = document.getElementById("cmt").value;

    await fetch(API + "/comment", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({text})
    });

    alert("sent");
}

/* ================= ADMIN ================= */
function admin(){
    document.getElementById("main").innerHTML = `
        <h2>Admin</h2>

        <h3>Create User</h3>
        <input id="u" placeholder="username">
        <input id="p" placeholder="password">
        <select id="r">
            <option value="user">user</option>
            <option value="admin">admin</option>
        </select>
        <button onclick="createUser()">Create</button>
    `;
}

async function createUser(){
    await fetch(API + "/create_user", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            username: document.getElementById("u").value,
            password: document.getElementById("p").value,
            role: document.getElementById("r").value
        })
    });

    alert("user created");
}

home();
</script>

</body>
</html>
